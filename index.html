<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PXE Security | Elite Overwatch</title>
    <style>
        :root {
            --bg: #020617;
            --card-bg: rgba(15, 23, 42, 0.85);
            --cyan: #00D1FF;
            --elite-gold: #FFD700;
            --blue: #3B82F6;
            --alert: #EF4444;
            --text: #F8FAFC;
            --border: rgba(59, 130, 246, 0.4);
        }

        body, html {
            margin: 0; padding: 0; height: 100vh;
            background: radial-gradient(circle at top left, #0f172a, #020617);
            color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden;
        }

        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.05; pointer-events: none; z-index: -1;
        }

        .glass-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .pxe-badge {
            display: inline-block; padding: 5px 12px; border: 1px solid var(--elite-gold);
            color: var(--elite-gold); font-family: monospace; font-weight: bold;
            font-size: 10px; border-radius: 4px; letter-spacing: 2px;
        }

        .btn {
            width: 100%; padding: 16px; border-radius: 10px; border: none;
            font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s ease; margin-bottom: 12px;
        }
        .btn-elite { background: linear-gradient(45deg, var(--cyan), var(--blue)); color: #000; box-shadow: 0 4px 15px rgba(0, 209, 255, 0.3); }
        .btn-outline { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--alert); color: var(--alert); }

        .screen { display: none; flex: 1; flex-direction: column; padding: 20px; overflow-y: auto; height: 100%; box-sizing: border-box;}
        .active-screen { display: flex; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-shrink: 0; }

        .log-box { flex: 1; overflow-y: auto; margin: 15px 0; padding: 12px; font-family: monospace; font-size: 11px; border-radius: 12px; }
        .log-entry { margin-bottom: 12px; border-left: 3px solid var(--cyan); padding: 10px; background: rgba(0, 209, 255, 0.05); border-radius: 0 8px 8px 0; }
        .stamp { display: block; color: var(--blue); font-size: 9px; margin-top: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <div id="login-screen" class="screen active-screen" style="justify-content:center; align-items:center; text-align:center;">
        <div style="font-size: 12px; color: var(--elite-gold); letter-spacing: 5px; margin-bottom: 10px;">PRO-TECH X ELITE</div>
        <div style="font-size: 48px; font-weight: 900; color: var(--text); text-shadow: 0 0 30px var(--cyan);">PXE</div>
        <div style="font-size: 10px; letter-spacing: 2px; color: var(--blue); margin-bottom: 40px; opacity: 0.7;">SECURITY INFRASTRUCTURE v5.0</div>
        
        <div class="glass-card" style="padding: 30px; width: 100%; max-width: 320px; border-top: 2px solid var(--elite-gold);">
            <input type="text" id="user-id" placeholder="OPERATOR KEY" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--border); color:white; padding:12px; margin-bottom:25px; text-align:center; font-size:16px;">
            <button class="btn btn-elite" onclick="login()">[ AUTHORIZE ACCESS ]</button>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <div style="margin-bottom: 30px;">
            <div class="pxe-badge">ELITE_OPS_PROTOCOLS</div>
            <h2 style="margin: 10px 0;">INITIALIZE_UNIT</h2>
        </div>
        <div class="glass-card" style="padding:20px;">
            <label style="font-size: 11px; color: var(--blue);">MISSION TYPE</label>
            <div style="display:flex; gap:10px; margin: 15px 0 25px;">
                <button id="role-patrol" class="btn btn-outline" style="margin:0;" onclick="setRole('patrol')">Mobile</button>
                <button id="role-stationary" class="btn btn-outline" style="margin:0;" onclick="setRole('stationary')">Stationary</button>
            </div>
            <label style="font-size: 11px; color: var(--blue);">TIME ROTATION</label>
            <button id="s-day" class="btn btn-outline" style="margin-top:15px;" onclick="setShift('Day')">Day Ops</button>
            <button id="s-grave" class="btn btn-outline" onclick="setShift('Grave')">Night Ops</button>
        </div>
        <button class="btn btn-elite" style="margin-top:auto;" onclick="startOps()">COMMENCE MISSION</button>
    </div>

    <div id="console-screen" class="screen" style="padding:0;">
        <div class="header" style="background:var(--card-bg); padding:18px; border-bottom:1px solid var(--border);">
            <div>
                <div style="font-weight:900; color:var(--text);">PXE_<span style="color:var(--cyan)">SITE_ALPHA</span></div>
                <div id="site-timer" style="font-family:monospace; font-size:12px; color:var(--elite-gold);">ACTIVE: 00:00:00</div>
            </div>
            <button class="btn-outline" style="width:auto; padding:6px 12px; font-size:10px; border-radius:6px; color:var(--elite-gold); border-color:var(--elite-gold);" onclick="togglePostOrders(true)">INTEL_ORDERS</button>
        </div>
        <div style="padding:20px; flex:1; display:flex; flex-direction:column;">
            <div class="log-box glass-card" id="main-log"></div>
            <div style="text-align:center; font-family:monospace; font-size:10px; color:var(--blue); margin-bottom:12px;">
                QUANTUM_PULSE: <span id="pulse-timer" style="color:var(--cyan)">--</span> | ENCRYPTION: ACTIVE
            </div>
            <input type="file" id="camera" accept="image/*" capture="environment" style="display:none;" onchange="autoNote('Visual Intelligence Synced.')">
            <button class="btn btn-elite" onclick="document.getElementById('camera').click()">AUTO-CAPTURE & AI LOG</button>
            <button class="btn btn-danger" onclick="checkOut()">MISSION COMPLETE / SYNC VAULT</button>
        </div>
    </div>

    <div id="report-screen" class="screen" style="background:#fff; color:#000; font-family: serif; padding: 40px;">
        <h1 style="border-bottom: 3px solid #000; margin-top:0;">DAILY ACTIVITY REPORT</h1>
        <div id="report-meta" style="font-size:13px; font-family:monospace; margin-bottom:30px;"></div>
        <div id="report-narrative" style="font-size:15px; line-height:1.8;"></div>
        <button class="btn btn-elite" style="margin-top:40px;" onclick="location.reload()">SYNC & ARCHIVE</button>
    </div>

    <script>
        let role = ''; let shift = ''; let timer = 0; let pulseInt; let siteInt;
        function login() {
            const id = document.getElementById('user-id').value.toUpperCase();
            if (id === 'MIL-774') navigate('setup-screen');
            else alert("PXE_ERROR: IDENTITY NOT RECOGNIZED");
        }
        function navigate(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }
        function setRole(r) { role = r; }
        function setShift(s) { shift = s; }
        function startOps() {
            if(!role || !shift) return alert("CONFIG REQUIRED");
            navigate('console-screen');
            autoNote("PXE_ELITE Deployment Active.");
            siteInt = setInterval(() => {
                timer++;
                let h = Math.floor(timer/3600).toString().padStart(2,'0');
                let m = Math.floor((timer%3600)/60).toString().padStart(2,'0');
                let s = (timer%60).toString().padStart(2,'0');
                document.getElementById('site-timer').innerText = `ACTIVE: ${h}:${m}:${s}`;
            }, 1000);
            let pulseMax = role === 'patrol' ? 60 : 1800;
            let pulseNow = pulseMax;
            pulseInt = setInterval(() => {
                pulseNow--;
                document.getElementById('pulse-timer').innerText = pulseNow + "s";
                if(pulseNow <= 0) {
                    autoNote("Automated PXE Pulse: Perimeter verified secure.");
                    pulseNow = pulseMax;
                }
            }, 1000);
        }
        function autoNote(msg) {
            const log = document.getElementById('main-log');
            const now = new Date();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span style="color:var(--cyan); font-weight:bold;">[${now.toLocaleTimeString()}]</span> ${msg}<span class="stamp">PXE_STAMP: ${now.toISOString()}</span>`;
            log.prepend(entry);
        }
        function checkOut() {
            clearInterval(siteInt); clearInterval(pulseInt);
            document.getElementById('report-meta').innerHTML = `OFFICER: PXE-774 | ASSIGNMENT: ${role.toUpperCase()} | SHIFT: ${shift}<br>DATE: 2026-04-08`;
            document.getElementById('report-narrative').innerHTML = `<b>OFFICIAL MISSION NARRATIVE:</b><br><br>Operator PXE-774 successfully completed a ${shift} ${role} deployment at SITE ALPHA. All telemetry pulses confirmed a 100% secure perimeter throughout the mission duration. Visual intelligence archived. Status: SECURE.`;
            navigate('report-screen');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro-TechX v2.0</title>
    <style>
        :root {
            --bg-color: #000000;
            --gunmetal: #1A1A1D;
            --neon-green: #39FF14;
            --alert-red: #FF2A2A;
            --kevlar-gray: #333333;
            --text-main: #FFFFFF;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Common Elements */
        .btn-large, .btn-outline {
            width: 100%;
            padding: 15px;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
            cursor: pointer;
            margin-bottom: 15px;
            box-sizing: border-box;
            text-align: center;
            text-transform: uppercase;
        }

        .btn-large {
            background-color: var(--gunmetal);
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
        }

        .btn-large:active { background-color: var(--neon-green); color: black; }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--kevlar-gray);
            color: white;
        }
        
        .btn-outline.selected {
            border-color: var(--neon-green);
            background-color: rgba(57, 255, 20, 0.1);
        }

        .btn-danger {
            background-color: transparent;
            border: 2px solid var(--alert-red);
            color: var(--alert-red);
        }

        .header {
            background-color: var(--gunmetal);
            padding: 15px;
            border-bottom: 2px solid var(--kevlar-gray);
            flex-shrink: 0;
        }

        .screen-title { font-size: 14px; color: gray; font-family: monospace; margin-bottom: 15px;}
        
        /* Layout Containers */
        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto; /* Fixes the scroll issue */
        }

        .active-screen { display: flex; }

        /* --- SPECIFIC SCREENS --- */
        
        /* 1. Login Screen */
        #login-screen {
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .logo-text { font-size: 32px; font-weight: 900; letter-spacing: 2px; }
        .input-group { width: 100%; max-width: 300px; margin-bottom: 20px; }
        .input-group input { width: 100%; padding: 15px; background-color: var(--gunmetal); border: 2px solid var(--kevlar-gray); color: white; font-size: 16px; box-sizing: border-box;}
        
        /* Site List Items */
        .site-item {
            background-color: var(--gunmetal);
            padding: 20px;
            margin-bottom: 10px;
            border-left: 4px solid var(--neon-green);
            cursor: pointer;
        }
        .site-item:active { background-color: #2a2a2d; }

        /* Console Elements */
        .pulse-ring {
            width: 120px; height: 120px;
            border: 4px solid var(--neon-green); border-radius: 50%;
            margin: 20px auto; display: flex; justify-content: center; align-items: center;
            font-family: monospace; font-size: 20px;
        }

    </style>
</head>
<body>

    <div id="login-screen" class="screen active-screen">
        <div class="logo-text">PRO-TECHX</div>
        <div style="color:gray; font-family:monospace; margin-bottom:40px; font-size:10px;">TACTICAL DISPATCH V2</div>
        <div class="input-group">
            <input type="text" id="badge-id" placeholder="OPERATOR ID">
        </div>
        <button class="btn-large" style="max-width:300px;" onclick="navigate('setup-screen')">[ AUTHENTICATE ]</button>
    </div>

    <div id="setup-screen" class="screen">
        <div class="screen-title">INITIALIZE DEPLOYMENT</div>
        
        <h3 style="margin-top:0;">SELECT ROLE</h3>
        <button class="btn-outline" id="role-patrol" onclick="selectRole('patrol')">Mobile Patrol</button>
        <button class="btn-outline" id="role-stationary" onclick="selectRole('stationary')">Stationary Guard</button>
        
        <h3 style="margin-top:20px;">SELECT SHIFT</h3>
        <button class="btn-outline" id="shift-day" onclick="selectShift('Day')">Day (0600 - 1400)</button>
        <button class="btn-outline" id="shift-swing" onclick="selectShift('Swing')">Swing (1400 - 2200)</button>
        <button class="btn-outline" id="shift-grave" onclick="selectShift('Grave')">Grave (2200 - 0600)</button>

        <button class="btn-large" style="margin-top:auto;" onclick="proceedFromSetup()">[ PROCEED ]</button>
    </div>

    <div id="district-screen" class="screen">
        <div class="screen-title">SELECT PATROL DISTRICT</div>
        <button class="btn-outline" onclick="loadSites('District 6 - Sacramento North')">District 6 (Sacramento North)</button>
        <button class="btn-outline" onclick="loadSites('District 7 - Placer / Roseville')">District 7 (Placer / Roseville)</button>
        <button class="btn-outline" onclick="loadSites('District 8 - Citrus Heights')">District 8 (Citrus Heights)</button>
        <button class="btn-outline" style="margin-top:auto; border-color:gray; color:gray;" onclick="navigate('setup-screen')">< BACK</button>
    </div>

    <div id="site-list-screen" class="screen">
        <div class="screen-title" id="site-list-title">AVAILABLE SITES</div>
        
        <div id="sites-container" style="flex:1;">
            </div>

        <div id="patrol-controls" style="display:none; margin-top:20px;">
            <div style="display:flex; gap:10px;">
                <button class="btn-outline" style="flex:1; border-color:orange; color:orange;">LOG BREAK</button>
                <button class="btn-danger" style="flex:1;" onclick="endShift()">FINISH ROUTE</button>
            </div>
        </div>
    </div>

    <div id="console-screen" class="screen" style="padding:0;">
        <div class="header">
            <div id="console-site-name" style="font-weight:bold; font-size:18px;">SITE NAME</div>
            <div style="font-family:monospace; color:var(--neon-green); font-size:12px;" id="console-status">LOCKED IN</div>
        </div>
        
        <div style="padding:20px; flex:1; display:flex; flex-direction:column;">
            <div style="text-align:center; color:gray; font-family:monospace;">PULSE CHECK</div>
            <div class="pulse-ring">60 SEC</div>

            <input type="file" id="nativeCamera" accept="image/*" capture="environment" style="display: none;">
            <button class="btn-large" style="background-color:var(--alert-red); color:white; border:none; margin-top:20px;" onclick="document.getElementById('nativeCamera').click()">LOG INCIDENT / CAMERA</button>

            <div style="margin-top:auto;">
                <button id="btn-jump-out" class="btn-outline" style="display:none;" onclick="navigate('site-list-screen')">JUMP OUT (EXIT SITE)</button>
                <button id="btn-sign-out" class="btn-danger" style="display:none;" onclick="endShift()">SIGN OUT & END SHIFT</button>
            </div>
        </div>
    </div>

    <script>
        // App State
        let userRole = '';
        let userShift = '';

        // Navigation Engine
        function navigate(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
        }

        // Setup Logic
        function selectRole(role) {
            userRole = role;
            document.getElementById('role-patrol').classList.remove('selected');
            document.getElementById('role-stationary').classList.remove('selected');
            document.getElementById('role-' + role).classList.add('selected');
        }

        function selectShift(shift) {
            userShift = shift;
            document.getElementById('shift-day').classList.remove('selected');
            document.getElementById('shift-swing').classList.remove('selected');
            document.getElementById('shift-grave').classList.remove('selected');
            document.getElementById('shift-' + shift.toLowerCase()).classList.add('selected');
        }

        function proceedFromSetup() {
            if (!userRole || !userShift) {
                alert("Please select both a Role and a Shift.");
                return;
            }
            if (userRole === 'patrol') {
                navigate('district-screen');
            } else {
                loadSites('Stationary Assignment'); // Skips district
            }
        }

        // Load Dummy Sites
        function loadSites(region) {
            document.getElementById('site-list-title').innerText = region.toUpperCase();
            const container = document.getElementById('sites-container');
            container.innerHTML = ''; // Clear old list

            // Generate some dummy sites based on selection
            let sites = [];
            if (userRole === 'stationary') {
                sites = ['Citrus Heights Plaza - Static', 'Roseville Auto Mall - Post 1'];
                document.getElementById('patrol-controls').style.display = 'none';
            } else {
                sites = ['Site A - North Gate', 'Site B - Perimeter', 'Site C - Loading Dock'];
                document.getElementById('patrol-controls').style.display = 'block';
            }

            sites.forEach(site => {
                let div = document.createElement('div');
                div.className = 'site-item';
                div.innerText = site;
                div.onclick = () => enterSiteConsole(site);
                container.appendChild(div);
            });

            navigate('site-list-screen');
        }

        // Enter the Active Console
        function enterSiteConsole(siteName) {
            document.getElementById('console-site-name').innerText = siteName;
            
            // Adjust buttons based on role
            if (userRole === 'patrol') {
                document.getElementById('btn-jump-out').style.display = 'block';
                document.getElementById('btn-sign-out').style.display = 'none';
            } else {
                // Stationary is locked in, can only end shift
                document.getElementById('btn-jump-out').style.display = 'none';
                document.getElementById('btn-sign-out').style.display = 'block';
            }

            navigate('console-screen');
        }

        function endShift() {
            if(confirm("Are you sure you want to end your shift and log out?")) {
                userRole = '';
                userShift = '';
                document.querySelectorAll('.btn-outline').forEach(b => b.classList.remove('selected'));
                navigate('login-screen');
            }
        }
    </script>
</body>
</html>
